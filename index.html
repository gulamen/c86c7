<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8"/>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes"/>
<title>Survival Car Race</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: #0a0a0f; overflow: hidden; }

  #unity-container {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
  }
  #unity-container.unity-mobile {
    position: fixed;
    left: 0; top: 0;
    width: 100%; height: 100%;
    transform: none;
  }
  #unity-canvas {
    background: #231F20;
    display: block;
  }
  .unity-mobile #unity-canvas { width: 100%; height: 100%; }

  /* ── Loading Overlay ── */
  #loading-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    /* ARKA PLAN: koyu araba teması */
    background:
      radial-gradient(ellipse at 50% 110%, #ff6a0022 0%, transparent 60%),
      radial-gradient(ellipse at 20% 50%, #ff000011 0%, transparent 50%),
      linear-gradient(160deg, #0a0a0f 0%, #141420 40%, #0d0d15 100%);
  }

  /* yol çizgileri dekoratif */
  #loading-overlay::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 48%,
      #ffffff08 48%,
      #ffffff08 52%,
      transparent 52%,
      transparent 100%
    );
    pointer-events: none;
  }

  .loading-box {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; gap: 24px;
    padding: 48px 56px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,120,0,0.2);
    border-radius: 16px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 60px rgba(255,90,0,0.08), 0 20px 60px rgba(0,0,0,0.5);
    min-width: 340px;
  }

  /* ── AUTO-SIZING LOGO ── */
  .game-logo {
    width: clamp(180px, 30vw, 320px);   /* ekrana gore otomatik boyutlanir */
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .logo-icon {
    font-size: clamp(40px, 7vw, 72px);
    line-height: 1;
    filter: drop-shadow(0 0 16px #ff6a00cc);
  }
  .logo-title {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: clamp(18px, 3.5vw, 32px);
    font-weight: 900;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
    text-shadow: 0 0 20px #ff6a0088;
    text-align: center;
    line-height: 1.1;
  }
  .logo-sub {
    font-family: Arial, sans-serif;
    font-size: clamp(9px, 1.5vw, 13px);
    letter-spacing: 6px;
    color: #ff9944cc;
    text-transform: uppercase;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    width: clamp(240px, 28vw, 300px);
  }
  .progress-label {
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: #ffffff55;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }
  .progress-track {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6a00, #ee0979);
    border-radius: 3px;
    transition: width 0.2s ease;
    box-shadow: 0 0 12px #ff6a0088;
  }
  .progress-pct {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 11px;
    color: #ff9944;
    text-align: right;
    margin-top: 4px;
  }
  .progress-info {
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: #ffffff33;
    text-align: center;
    margin-top: 6px;
    min-height: 14px;
  }
</style>
</head>
<body>

<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
</div>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="loading-box">

    <!-- AUTO-SIZING LOGO -->
    <div class="game-logo">
      <div class="logo-icon">🚗</div>
      <div class="logo-title">Survival<br>Car Race</div>
      <div class="logo-sub">WebGL</div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-wrap">
      <div class="progress-label">Loading</div>
      <div class="progress-track">
        <div class="progress-fill" id="bar-fill"></div>
      </div>
      <div class="progress-pct" id="bar-pct">0%</div>
      <div class="progress-info" id="bar-info">Hazırlanıyor...</div>
    </div>

  </div>
</div>

<script>
/* ╔══════════════════════════════════════════════════════════╗
   ║  CONFIG — sadece bu bolumu guncelleyin                   ║
   ╚══════════════════════════════════════════════════════════╝ */

const BUILD_CDN = "Build";

/* framework.js.br -> boyutuna gore: kucukse direkt CDN,
   buyukse parcalara bolunmus olacak (PS scripti halleder) */
const FRAMEWORK_PARTS = 3;  /* framework parcalanmissa sayi, 1 ise direkt */

const DATA_PARTS      = 6;  /* Survival car.data.br       45 MB  */
const WASM_PARTS      = 8;  /* Survival car.wasm.br       56.4MB */

/* ╔══════════════════════════════════════════════════════════╗
   ║  BURADAN ASAGI DOKUNMAYIN                                ║
   ╚══════════════════════════════════════════════════════════╝ */

/* UI */
const overlay  = document.getElementById('loading-overlay');
const barFill  = document.getElementById('bar-fill');
const barPct   = document.getElementById('bar-pct');
const barInfo  = document.getElementById('bar-info');

function setBar(p, info) {
    barFill.style.width = p + '%';
    barPct.textContent  = Math.round(p) + '%';
    if (info !== undefined) barInfo.textContent = info;
}

/* Canvas resize */
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
const container = document.querySelector('#unity-container');
const canvas    = document.querySelector('#unity-canvas');

if (isMobile) {
    var meta = document.createElement('meta');
    meta.name    = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.head.appendChild(meta);
    container.className = 'unity-mobile';
    canvas.className    = 'unity-mobile';
} else {
    canvas.style.width  = '960px';
    canvas.style.height = '600px';
}

document.addEventListener('contextmenu', e => e.preventDefault());
function focusGame() { canvas.focus(); }
window.addEventListener('pointerdown', focusGame);
window.addEventListener('touchstart',  focusGame);

/* ──── PART INDIRME + BIRLESTIRME ──── */
async function fetchParts(baseName, partCount, label, barStart, barEnd) {
    const parts = [];
    for (let i = 0; i < partCount; i++) {
        const pct = barStart + ((i / partCount) * (barEnd - barStart));
        setBar(pct, `${label} (${i + 1}/${partCount}) indiriliyor...`);
        const url = `${BUILD_CDN}/${encodeURIComponent(baseName)}.part${i}`;
        const r   = await fetch(url);
        if (!r.ok) throw new Error(`${baseName}.part${i}: HTTP ${r.status}`);
        parts.push(new Uint8Array(await r.arrayBuffer()));
    }
    setBar(barEnd, `${label} birleştiriliyor...`);
    const total  = parts.reduce((s, p) => s + p.length, 0);
    const merged = new Uint8Array(total);
    let off = 0;
    for (const p of parts) { merged.set(p, off); off += p.length; }
    return merged;
}

/* ──── BLOB URL — .br extension hilesi ────
   blob URL'ye #filename.br fragment ekliyoruz.
   Unity loader URL'nin sonuna bakip .br gorunce
   kendi bundled brotli decompressor'ini devreye sokuyor.
   Fragment kismi fetch sirasinda browser tarafindan yok sayilir,
   yani blob dogru sekilde yuklenir. */
function brBlobUrl(uint8, filename) {
    const blob = new Blob([uint8], { type: 'application/octet-stream' });
    return URL.createObjectURL(blob) + '#' + encodeURIComponent(filename);
}

/* ──── ANA AKIS ──── */
(async function () {
    try {
        setBar(0, 'Hazırlanıyor...');

        /* 1) data.br */
        const dataBytes = await fetchParts('Survival car.data.br', DATA_PARTS, 'Data', 0, 40);
        const dataUrl   = brBlobUrl(dataBytes, 'Survival car.data.br');
        setBar(40);

        /* 2) wasm.br */
        const wasmBytes = await fetchParts('Survival car.wasm.br', WASM_PARTS, 'WASM', 40, 75);
        const wasmUrl   = brBlobUrl(wasmBytes, 'Survival car.wasm.br');
        setBar(75);

        /* 3) framework.js.br — parcalıysa birlestir, tek parcaysa direkt CDN */
        let frameworkUrl;
        if (FRAMEWORK_PARTS <= 1) {
            /* Direkt CDN URL'i — .br extension zaten var */
            frameworkUrl = `${BUILD_CDN}/Survival%20car.framework.js.br`;
        } else {
            const fwBytes = await fetchParts('Survival car.framework.js.br', FRAMEWORK_PARTS, 'Framework', 75, 85);
            frameworkUrl  = brBlobUrl(fwBytes, 'Survival car.framework.js.br');
        }
        setBar(85, 'Oyun yükleniyor...');

        /* 4) Config */
        function unityShowBanner(msg, type) {
            console[type === 'error' ? 'error' : 'warn'](msg);
        }

        const config = {
            dataUrl:            dataUrl,
            frameworkUrl:       frameworkUrl,
            codeUrl:            wasmUrl,
            streamingAssetsUrl: 'StreamingAssets',
            companyName:        'DefaultCompany',
            productName:        'Survival Car Race',
            productVersion:     '0.0.01',
            showBanner:         unityShowBanner,
        };

        /* 5) Loader */
        await new Promise((res, rej) => {
            const s = document.createElement('script');
            s.src     = `${BUILD_CDN}/Survival%20car.loader.js`;
            s.onload  = res;
            s.onerror = () => rej(new Error('Loader yüklenemedi'));
            document.body.appendChild(s);
        });

        /* 6) Unity */
        const inst = await createUnityInstance(canvas, config, (p) => {
            setBar(85 + Math.round(p * 15), '');
        });

        window.unityInstance = inst;
        setBar(100, '');

        /* Fullscreen butonu */
        const fsBtn = document.querySelector('#unity-fullscreen-button');
        if (fsBtn) fsBtn.onclick = () => inst.SetFullscreen(1);

        /* Overlay kapat */
        overlay.style.display = 'none';
        focusGame();

    } catch (err) {
        console.error(err);
        setBar(0, '⚠ Hata: ' + err.message);
    }
})();
</script>

</body>
</html>
